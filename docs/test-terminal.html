<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Test</title>
  <style>
    @font-face {
      font-family: "JetBrainsMono Nerd Font";
      src: url("https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@latest/patched-fonts/JetBrainsMono/Ligatures/Regular/JetBrainsMonoNerdFont-Regular.ttf") format("truetype");
      font-weight: normal; font-style: normal;
    }
    @font-face {
      font-family: "JetBrainsMono Nerd Font";
      src: url("https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@latest/patched-fonts/JetBrainsMono/Ligatures/Bold/JetBrainsMonoNerdFont-Bold.ttf") format("truetype");
      font-weight: bold; font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    body { display: flex; flex-direction: column; }

    .bar { height: 40px; min-height: 40px; background: #1a2744; display: flex; align-items: center; padding: 0 1rem; }
    .bar span { color: #fff; font-size: 0.82rem; font-weight: 500; }

    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    iframe { width: 100%; flex: 1; border: none; min-height: 0; }

    .terminal-panel {
      display: none; flex-direction: column;
      background: #1e1e1e; border-top: 2px solid #333; overflow: hidden;
    }
    .terminal-panel.open { display: flex; }
    .terminal-titlebar {
      height: 32px; min-height: 32px; background: #2d2d2d;
      display: flex; align-items: center; padding: 0 12px; gap: 10px;
      border-bottom: 1px solid #1a1a1a; cursor: ns-resize;
    }
    .terminal-titlebar-title { color: #ccc; font-size: 0.75rem; font-weight: 500; flex: 1; }
    .terminal-status { font-size: 0.68rem; color: #888; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #666; }
    .status-dot.connected { background: #27c93f; }
    .status-dot.connecting { background: #ffbd2e; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .terminal-close { background: none; border: none; color: #888; font-size: 1.1rem; cursor: pointer; padding: 0 4px; }
    .terminal-close:hover { color: #fff; }
    #terminal-container { flex: 1; padding: 8px; min-height: 0; overflow: hidden; }

    .edit-btn {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: #2c5282; color: #fff; border: none;
      padding: 0.65rem 1.25rem; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 1000;
    }
    .edit-btn:hover { background: #1a2744; }
    .edit-btn.hidden { display: none; }
  </style>
</head>
<body>
  <div class="bar"><span>Terminal Test — leg-tech-editor-test-app</span></div>
  <div class="content">
    <iframe src="https://leg-tech-editor-test-app.fly.dev/"></iframe>
    <div class="terminal-panel" id="terminal-panel">
      <div class="terminal-titlebar" id="terminal-titlebar">
        <span class="terminal-titlebar-title">Terminal</span>
        <span class="terminal-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text"></span>
        </span>
        <button class="terminal-close" id="terminal-close">&times;</button>
      </div>
      <div id="terminal-container"></div>
    </div>
  </div>
  <button class="edit-btn" id="edit-btn">Open Terminal</button>

  <script type="module">
    import { init, Terminal, FitAddon } from './ghostty-web/ghostty-web.js';

    const WS_URL = 'ws://localhost:8080/ws';

    let term = null, fitAddon = null, ws = null;
    let terminalHeight = 350;
    const panel = document.getElementById('terminal-panel');
    const container = document.getElementById('terminal-container');
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const btn = document.getElementById('edit-btn');

    btn.addEventListener('click', openTerminal);
    document.getElementById('terminal-close').addEventListener('click', closeTerminal);

    async function openTerminal() {
      btn.classList.add('hidden');
      await init();
      term = new Terminal({
        cursorBlink: true, fontSize: 14,
        fontFamily: '"JetBrainsMono Nerd Font", Monaco, Menlo, "Courier New", monospace',
        theme: { background: '#1e1e1e', foreground: '#d4d4d4' },
        scrollback: 10000,
      });
      fitAddon = new FitAddon();
      term.loadAddon(fitAddon);
      panel.classList.add('open');
      panel.style.height = terminalHeight + 'px';
      await term.open(container);
      fitAddon.fit();

      document.addEventListener('keydown', handleKeys, true);
      window.addEventListener('resize', () => fitAddon.fit());
      term.onResize(size => {
        if (ws?.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
      });
      term.onData(data => {
        if (ws?.readyState === WebSocket.OPEN) ws.send(data);
      });

      connect();
    }

    function connect(retries = 0) {
      dot.className = 'status-dot connecting';
      text.textContent = retries > 0 ? `Reconnecting (${retries})…` : 'Connecting…';

      const sep = WS_URL.includes('?') ? '&' : '?';
      ws = new WebSocket(`${WS_URL}${sep}cols=${term.cols}&rows=${term.rows}`);

      ws.onopen = () => {
        dot.className = 'status-dot connected';
        text.textContent = 'Connected';
      };
      ws.onmessage = e => term.write(e.data);
      ws.onerror = () => { dot.className = 'status-dot'; text.textContent = 'Error'; };
      ws.onclose = () => {
        dot.className = 'status-dot';
        text.textContent = 'Disconnected';
        if (retries < 30) setTimeout(() => connect(retries + 1), 2000);
      };
    }

    function closeTerminal() {
      if (ws) { ws.close(); ws = null; }
      if (term) { term.dispose(); term = null; }
      panel.classList.remove('open');
      panel.style.height = '';
      btn.classList.remove('hidden');
      document.removeEventListener('keydown', handleKeys, true);
    }

    function handleKeys(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (e.shiftKey && ws?.readyState === WebSocket.OPEN) ws.send('\x1b[Z');
      }
      if (e.key === 'Enter' && e.shiftKey) {
        e.preventDefault(); e.stopPropagation();
        if (ws?.readyState === WebSocket.OPEN) ws.send('\n');
      }
      if (e.metaKey && e.key !== 'Meta') {
        e.stopPropagation();
        if (e.key === 'v') {
          e.preventDefault();
          navigator.clipboard.readText().then(t => { if (t && ws?.readyState === WebSocket.OPEN) ws.send(t); });
        }
      }
    }

    // Drag to resize — overlay prevents iframe from stealing mouse events
    {
      let dragging = false, startY, startH;
      const overlay = document.createElement('div');
      Object.assign(overlay.style, {
        position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
        zIndex: '9999', cursor: 'ns-resize', display: 'none',
      });
      document.body.appendChild(overlay);

      document.getElementById('terminal-titlebar').addEventListener('mousedown', e => {
        dragging = true; startY = e.clientY; startH = panel.offsetHeight;
        overlay.style.display = 'block';
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const h = Math.max(150, Math.min(window.innerHeight - 100, startH + (startY - e.clientY)));
        panel.style.height = h + 'px'; terminalHeight = h;
        if (fitAddon) fitAddon.fit();
      });
      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        overlay.style.display = 'none';
      });
    }
  </script>
</body>
</html>
